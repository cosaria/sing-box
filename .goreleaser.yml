version: 2

project_name: sing-box

builds:
  - main: ./cmd/sing-box
    binary: sing-box-{{ .Os }}-{{ .Arch }}
    no_unique_dist_dir: true
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - format: binary
    name_template: "sing-box-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

dockers:
  - image_templates:
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-amd64"
    use: buildx
    goarch: amd64
    dockerfile: Dockerfile
    extra_files:
      - Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-arm64"
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile
    extra_files:
      - Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/cosaria/sing-box:{{ .Version }}"
    image_templates:
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-amd64"
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-arm64"
  - name_template: "ghcr.io/cosaria/sing-box:latest"
    image_templates:
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-amd64"
      - "ghcr.io/cosaria/sing-box:{{ .Version }}-arm64"

release:
  github:
    owner: cosaria
    name: sing-box
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
